name: CI

on:
  push:
    branches:
      - main
      - staging
      - release/**
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend PHPUnit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: curl, sqlite3
          tools: composer:v2

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run backend tests
        run: php vendor/bin/phpunit --configuration phpunit.xml.dist

  e2e-smoke:
    name: E2E Smoke (Desktop + Mobile)
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    timeout-minutes: 25
    env:
      REQUIRE_E2E_BUSINESS: "false"
    defaults:
      run:
        working-directory: frontend-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke and recovery specs
        run: |
          npx playwright test \
            e2e/smoke.spec.js \
            e2e/recovery-flow.spec.js \
            e2e/modal-a11y.spec.js \
            e2e/business-flow.spec.js \
            --project=desktop-chromium \
            --project=mobile-chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-vue/playwright-report
          if-no-files-found: ignore
